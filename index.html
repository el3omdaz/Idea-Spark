<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IdeaSpark">
<meta name="theme-color" content="#08080f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>IdeaSpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f;--s1:#0f0f1a;--s2:#161624;--s3:#1e1e30;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --accent:#7b6cf0;--accent2:#0fd9a0;--accent3:#f07b6c;
  --text:#eeeef8;--text2:#8888aa;--text3:#55556a;
  --r:16px;--fn:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
body{font-family:var(--fn)}
.app{
  max-width:430px;height:100vh;height:100dvh;
  margin:0 auto;background:var(--bg);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}
/* Header */
.hdr{
  padding-top:max(env(safe-area-inset-top,44px),44px);
  padding-left:20px;padding-right:20px;
  background:linear-gradient(to bottom,var(--bg) 70%,transparent);
  position:relative;z-index:100;flex-shrink:0;
}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:36px;height:36px;border-radius:11px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0
}
.logo-name{
  font-size:19px;font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.3px
}
.hdr-btns{display:flex;gap:8px}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border2);background:var(--s2);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .18s
}
.icon-btn.active,.icon-btn:active{border-color:var(--accent);color:var(--accent)}
/* Content */
.content{flex:1;padding:16px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(88px + env(safe-area-inset-bottom,16px))}
/* Bottom nav */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,var(--bg) 65%,transparent);
  padding:10px 20px;padding-bottom:max(env(safe-area-inset-bottom,16px),16px);
  display:flex;align-items:center;justify-content:space-around;z-index:100;flex-shrink:0
}
.nav-btn{
  background:none;border:none;color:var(--text3);
  font-family:var(--fn);font-size:11px;font-weight:600;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 16px;border-radius:12px;transition:color .18s
}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}
.fab{
  width:56px;height:56px;border-radius:18px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#9b6cf0);
  color:#fff;font-size:28px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px var(--accent)55;transition:all .18s;transform:translateY(-4px)
}
/* Screens */
.screen{display:none}
.screen.active{display:block}
/* Search + chips */
.search-box{
  width:100%;background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;color:var(--text);
  font-family:var(--fn);font-size:14px;outline:none;margin-bottom:10px;
}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text3)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:14px}
.chips::-webkit-scrollbar{display:none}
.chip{
  padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--s1);color:var(--text2);cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;font-family:var(--fn);transition:all .18s
}
.chip.active{background:var(--accent)22;border-color:var(--accent);color:var(--accent)}
/* Cards */
.grid{display:flex;flex-direction:column;gap:10px}
.idea-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;cursor:pointer;transition:all .18s
}
.idea-card:active{border-color:var(--border2);transform:scale(.99)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-title覆{font-size:15px;font-weight:700;line-height:1.35}
.card-desc{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-date{font-size:11px;color:var(--text3)}
.card-dots{display:flex;align-items:center;gap:8px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2)}
.del-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.45;padding:4px;border-radius:6px}
.del-btn:active{opacity:1}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
/* Form */
.form-view{display:flex;flex-direction:column;gap:18px}
.form-title{font-size:22px;font-weight:800;letter-spacing:-.3px}
.form-sub{font-size:13px;color:var(--text2);margin-top:4px;margin-bottom:4px}
.field{display:flex;flex-direction:column;gap:7px}
.field-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.input,.textarea{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:13px 15px;color:var(--text);
  font-family:var(--fn);font-size:15px;outline:none;transition:border .18s;width:100%
}
.input:focus,.textarea:focus{border-color:var(--accent)}
.input::placeholder,.textarea::placeholder{color:var(--text3)}
.textarea{resize:none;min-height:88px;line-height:1.6}
.field-error{font-size:12px;color:var(--accent3)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-btn{
  padding:14px 8px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--s1);cursor:pointer;text-align:center;
  font-family:var(--fn);font-size:12px;font-weight:700;color:var(--text2);transition:all .18s
}
.cat-btn.sel{background:var(--accent)18;border-color:var(--accent);color:var(--accent)}
.cat-icon{font-size:24px;display:block;margin-bottom:5px}
/* Buttons */
.btn{
  width:100%;padding:15px;border-radius:13px;border:none;
  font-family:var(--fn);font-size:15px;font-weight:700;cursor:pointer;
  transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px
}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9b6cf0);color:#fff;box-shadow:0 6px 24px var(--accent)44}
.btn-ghost{background:var(--s2);color:var(--text2);border:1px solid var(--border)}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-teal{background:var(--accent2)22;color:var(--accent2);border:1px solid var(--accent2)44}
.btn-danger{background:var(--accent3)18;color:var(--accent3);border:1px solid var(--accent3)33}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:10px 16px;font-size:13px;width:auto;border-radius:10px}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row .btn{flex:1}
/* Detail */
.back-btn{
  background:none;border:none;color:var(--accent);
  font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;
  padding:0;margin-bottom:20px;display:flex;align-items:center;gap:6px
}
.detail-title{font-size:23px;font-weight:800;line-height:1.3;margin-bottom:8px;letter-spacing:-.3px}
.detail-desc{color:var(--text2);font-size:14px;line-height:1.65;margin-bottom:12px}
.detail-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:4px}
.ai-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:14px}
.ai-card-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.ai-text{font-size:13px;line-height:1.75;color:var(--text2)}
.ai-text h4{color:var(--text);font-size:13px;font-weight:700;margin:12px 0 6px}
.ai-text li{margin-bottom:3px;padding-inline-start:16px}
.ai-text p{margin-bottom:3px}
.no-key-banner{
  background:var(--accent3)14;border:1px solid var(--accent3)33;
  border-radius:12px;padding:12px 14px;font-size:13px;color:var(--accent3);
  margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:10px
}
.analysis-off{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text2);margin-top:14px}
/* Chat */
.chat-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-top:14px;overflow:hidden}
.chat-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px}
.chat-msgs{padding:12px 14px;display:flex;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bubble{max-width:84%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6}
.bubble.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bubble.ai-bubble{background:var(--s2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
.bubble-label{font-size:10px;font-weight:700;opacity:.6;margin-bottom:3px;letter-spacing:.4px}
.chat-thinking{align-self:flex-start;color:var(--text3);font-size:13px;font-style:italic;padding:6px 0}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border)}
.chat-input{
  flex:1;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;color:var(--text);
  font-family:var(--fn);font-size:13px;outline:none;
  resize:none;line-height:1.5;max-height:88px
}
.chat-input:focus{border-color:var(--accent2)}
.chat-input::placeholder{color:var(--text3)}
.chat-send{
  background:var(--accent2);color:#08080f;border:none;
  border-radius:10px;padding:10px 13px;cursor:pointer;
  font-size:16px;align-self:flex-end;font-weight:700
}
.chat-send:disabled{opacity:.35;cursor:not-allowed}
/* Settings */
.settings-title{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:22px}
.section{background:var(--s1);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:16px 16px 6px;margin-top:16px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px}
.srow:last-child{border-bottom:none}
.srow-block{padding:14px 16px;border-bottom:1px solid var(--border)}
.srow-block:last-child{border-bottom:none}
.slabel{font-size:14px;font-weight:600}
.sdesc{font-size:12px;color:var(--text2);margin-top:3px}
.toggle-btn{
  width:48px;height:28px;border-radius:14px;border:none;cursor:pointer;
  background:var(--s3);position:relative;transition:background .2s;flex-shrink:0
}
.toggle-btn.on{background:var(--accent)}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .2s;box-shadow:0 1px 4px #0005
}
.toggle-btn.on .toggle-thumb{transform:translateX(20px)}
.lang-toggle{display:flex;gap:6px}
.lang-opt{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--s2);color:var(--text2);font-family:var(--fn);font-size:13px;
  cursor:pointer;font-weight:600;transition:all .18s
}
.lang-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.api-key-status{font-size:12px;color:var(--accent2);margin-top:6px}
.api-help-steps{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.api-step{font-size:13px;color:var(--text2)}
.api-link{color:var(--accent);text-decoration:none;font-weight:600}
.mode-option{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px;cursor:pointer}
.mode-option:last-child{border-bottom:none}
.mode-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.mode-dot.sel{border-color:var(--accent);background:var(--accent)}
.mode-dot.sel::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}
/* Modal */
.overlay{position:fixed;inset:0;background:#00000088;z-index:500;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--s2);border-radius:20px;border:1px solid var(--border2);padding:24px;width:100%;max-width:320px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:10px}
.modal p{color:var(--text2);font-size:13px;margin-bottom:22px;line-height:1.5}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{flex:1}
.hidden{display:none!important}
/* Toast */
.toast{
  position:fixed;bottom:calc(88px + env(safe-area-inset-bottom,16px));
  left:50%;transform:translateX(-50%);
  background:var(--s3);color:var(--text);border:1px solid var(--border2);
  padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;
  z-index:600;white-space:nowrap;box-shadow:0 8px 24px #0008;
  opacity:0;transition:opacity .2s;pointer-events:none
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="logo">
        <div class="logo-icon">💡</div>
        <span class="logo-name">IdeaSpark</span>
      </div>
      <div class="hdr-btns">
        <button class="icon-btn hidden" id="warn-btn" title="No API Key" onclick="nav('settings')">⚠️</button>
        <button class="icon-btn" id="settings-btn" onclick="nav('settings')">⚙️</button>
      </div>
    </div>
  </div>

  <div class="content" id="content">

    <div class="screen active" id="screen-list">
      <input class="search-box" id="search-input" placeholder="ابحث..." oninput="renderList()">
      <div class="chips" id="filter-chips"></div>
      <div id="ideas-grid"></div>
    </div>

    <div class="screen" id="screen-new">
      <div class="form-view">
        <div>
          <div class="form-title" id="form-title-txt">✨ فكرة جديدة</div>
          <div class="form-sub" id="form-sub-txt"></div>
        </div>
        <div class="field">
          <div class="field-label" id="lbl-title">عنوان الفكرة</div>
          <input class="input" id="idea-title-input" placeholder="اكتب فكرتك...">
          <span class="field-error hidden" id="title-error"></span>
        </div>
        <div class="field">
          <div class="field-label" id="lbl-desc">تفاصيل</div>
          <textarea class="textarea" id="idea-desc-input" placeholder="أي تفاصيل إضافية..."></textarea>
        </div>
        <div class="field">
          <div class="field-label" id="lbl-cat">نوع الفكرة</div>
          <div class="cat-grid" id="cat-grid"></div>
        </div>
        <div class="field hidden" id="custom-type-field">
          <div class="field-label" id="lbl-custom">نوع مخصص</div>
          <input class="input" id="custom-type-input" placeholder="اكتب نوعاً مخصصاً..." list="saved-types-list">
          <datalist id="saved-types-list"></datalist>
        </div>
        <button class="btn btn-primary" id="save-btn" onclick="doSave()">حفظ الفكرة</button>
        <button class="btn btn-ghost" onclick="nav('list')">إلغاء</button>
      </div>
    </div>

    <div class="screen" id="screen-detail">
      <button class="back-btn" onclick="nav('list')"><span id="back-
